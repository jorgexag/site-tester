<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hero 3 – Promo / Sale</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <section class="hero">
    <!-- Top bar -->
    <div class="topbar">
      <span class="topbar__brand">FlashSale</span>
      <span class="topbar__tagline">Limited time offer</span>
    </div>

    <!-- Split card -->
    <div class="card">
      <div class="card__left">
        <p class="card__label">This weekend only</p>
        <h1 class="card__headline">50<span class="card__pct">%</span><br>OFF</h1>
        <p class="card__note">Everything in store</p>
      </div>
      <div class="card__right">
        <p class="card__pitch">Don't miss out on our biggest sale of the year. In-store and online.</p>
        <a href="#" class="btn">Shop Now →</a>
        <div class="countdown" id="countdown">
          <div class="countdown__unit">
            <span class="countdown__num" id="cd-h">00</span>
            <span class="countdown__label">hrs</span>
          </div>
          <span class="countdown__sep">:</span>
          <div class="countdown__unit">
            <span class="countdown__num" id="cd-m">00</span>
            <span class="countdown__label">min</span>
          </div>
          <span class="countdown__sep">:</span>
          <div class="countdown__unit">
            <span class="countdown__num" id="cd-s">00</span>
            <span class="countdown__label">sec</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer strip -->
    <div class="strip" aria-hidden="true">
      <span>FREE SHIPPING</span><span>·</span>
      <span>EASY RETURNS</span><span>·</span>
      <span>NO CODE NEEDED</span><span>·</span>
      <span>FREE SHIPPING</span><span>·</span>
      <span>EASY RETURNS</span><span>·</span>
      <span>NO CODE NEEDED</span>
    </div>
  </section>
  <script src="script.js"></script>
</body>
</html>
