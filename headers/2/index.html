<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hero 2 – Local Business</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <section class="hero">
    <header class="hero__header">
      <div class="logo">Rosario's</div>
      <nav class="nav">
        <a href="#">Menu</a>
        <a href="#">Hours</a>
        <a href="#" class="nav__cta">Reserve</a>
      </nav>
    </header>

    <div class="hero__body">
      <div class="hero__text">
        <p class="hero__eyebrow">Family owned since 1987</p>
        <h1 class="hero__title">Taste the<br><em>difference.</em></h1>
        <p class="hero__desc">Fresh ingredients, old-world recipes, and a table always waiting for you.</p>
        <div class="hero__actions">
          <a href="#" class="btn btn--fill">Order Now</a>
          <a href="#" class="btn btn--line">View Menu</a>
        </div>
        <p class="hero__info">📍 128 Elm St &nbsp;·&nbsp; Open daily 11am – 10pm</p>
      </div>

      <div class="hero__visual">
        <div class="hero__plate">
          <span class="plate__icon">🍝</span>
        </div>
        <div class="tag tag--1">⭐ 4.9 Rating</div>
        <div class="tag tag--2">Free Delivery<br>Over $35</div>
      </div>
    </div>
  </section>
  <script src="script.js"></script>
</body>
</html>
