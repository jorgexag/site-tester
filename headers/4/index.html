<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hero 4 – Centered + Background Image</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,800;1,400&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet"/>
</head>
<body>
  <section class="hero">

    <!-- Background image — swap src to your own image -->
    <img
      class="hero__bg"
      src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=2783&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      alt=""
      aria-hidden="true"
      fetchpriority="high"
    />

    <!-- Overlay -->
    <div class="hero__overlay"></div>

    <!-- Nav -->
    <header class="hero__nav">
      <span class="hero__logo">Everest</span>
      <a href="#" class="hero__nav-link">Learn More</a>
    </header>

    <!-- Centered content -->
    <div class="hero__content">
      <p class="hero__eyebrow">August 12 – 20 · Nepal</p>
      <h1 class="hero__title">Above the<br><em>Clouds.</em></h1>
      <p class="hero__desc">Join our guided 8-day trek through the world's most breathtaking mountain trails. All skill levels welcome.</p>
      <a href="#" class="btn">Reserve Your Spot</a>
      <p class="hero__note">Only 12 spots remaining</p>
    </div>

    <!-- Scroll hint -->
    <div class="hero__scroll" aria-hidden="true">
      <span class="hero__scroll-line"></span>
    </div>

  </section>
  <script src="script.js"></script>
</body>
</html>
